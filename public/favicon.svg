<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Graph nodes and connections -->
  <g stroke="#fff" stroke-width="3" fill="none">
    <!-- Connections -->
    <line x1="50" y1="25" x2="30" y2="50"/>
    <line x1="50" y1="25" x2="70" y2="50"/>
    <line x1="30" y1="50" x2="25" y2="75"/>
    <line x1="30" y1="50" x2="45" y2="75"/>
    <line x1="70" y1="50" x2="55" y2="75"/>
    <line x1="70" y1="50" x2="75" y2="75"/>
  </g>
  
  <!-- Nodes -->
  <circle cx="50" cy="25" r="8" fill="#fff"/>
  <circle cx="30" cy="50" r="7" fill="#E0E7FF"/>
  <circle cx="70" cy="50" r="7" fill="#E0E7FF"/>
  <circle cx="25" cy="75" r="6" fill="#DDD6FE"/>
  <circle cx="45" cy="75" r="6" fill="#DDD6FE"/>
  <circle cx="55" cy="75" r="6" fill="#DDD6FE"/>
  <circle cx="75" cy="75" r="6" fill="#DDD6FE"/>
</svg>